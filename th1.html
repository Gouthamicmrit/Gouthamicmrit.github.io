<html>
   <head>
      <title>eoto</title>
      <style>
         @mixin vertical-align($position: relative) {
  position: $position;
  top: 50%;
  -webkit-transform: translateY(-50%);
  -ms-transform: translateY(-50%);
  transform: translateY(-50%);
}
body, html {
  background: rgb(179, 51, 115);
}
#wrapper {
  width: 600px;
  margin: 0 auto;
  margin-top: 5%;
}
h1 {
  color: #EEE;
  text-shadow: -1px -2px 3px rgba(17, 17, 17, 0.3);
  text-align: center;
  font-family: "Monsterrat", sans-serif;
  font-weight: 900;
  text-transform: uppercase;
  font-size: 80px;
  margin-bottom: -5px;
}
h1 underline {
  border-top: 8px solid rgba(4, 85, 69, 0.3);
  border-bottom: 8px solid rgba(4, 102, 82, 0.3);
}
h2 {
  width: 570px;
  margin-left: 16px;
  font-family: "Lato", sans-serif;
  font-weight: 600;
  color: #EEE;
}
:root {
  --borderWidth: 15px;
  --height: 65px;
  --width: 30px;
  --borderColor: white;
}

body {
  padding: 40px;
  text-align: center;
}

.check {
  display: inline-block;
  transform: rotate(45deg);
  height: var(--height);
  width: var(--width);
  border-bottom: var(--borderWidth) solid var(--borderColor);
  border-right: var(--borderWidth) solid var(--borderColor);
}



go-back{

    width: 570px;
  margin-left: 16px;
  font-family: "Lato", sans-serif;
  font-weight: 800;
  color: #EEE;
  padding-left: 25%;

}

p{

width: 570px;
margin-left: 16px;
font-family: "Lato", sans-serif;
font-weight: 800;
color: #EEE;
padding-left: 25%;

}





      </style>
      </head>
   
   <body>
      <div class="check" ></div>
      <div id="wrapper" class="animated zoomIn">
         <!-- We make a wrap around all of the content so that we can simply animate all of the content at the same time. I wanted a zoomIn effect and instead of placing the same class on all tags, I wrapped them into one div! -->
       <h1>
         <!-- The <h1> tag is the reason why the text is big! -->
         <underline>Thank you!</underline>
         <!-- The underline makes a border on the top and on the bottom of the text -->
       </h1>
       
       <h2>
         Your response has been recorded, Our team will get back to you regarding the same very soon!
         <!-- The <h3> take is the description text which appear under the <h1> tag. It's there so you can display some nice message to your visitors! -->
       </h2>
       </div>
      <script>
         $( document ).ready(function() {
  // perform some jQuery when page is loaded
  
$("h1").hover(function() { 
  // when user is hovering the h1
  $( this ).addClass("animated infinite pulse"); 
  // we add pulse animation and to infinite
}, function() {
  // when user no longer hover on the h1
  $( this ).removeClass("animated infinite pulse");
  // we remove the pulse
});
});



      </script>
      <p class="go-back"><a href="main.html">Go Back to Home Page</a></p>
   </body>
</html>
